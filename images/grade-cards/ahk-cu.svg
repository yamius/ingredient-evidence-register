  <rect x="522" y="44" width="72" height="72" rx="14" fill="#c08a1e"/><text x="558" y="92" text-anchor="middle" class="obig">C</text><text x="558" y="132" text-anchor="middle" class="olab">overall</text>
  <line x1="40" y1="120" x2="600" y2="120" stroke="currentColor" stroke-opacity=".18"/>
  <rect x="40" y="128" width="34" height="34" rx="7" fill="#c08a1e"/><text x="57" y="151" text-anchor="middle" class="chip">C</text><text x="90" y="142" class="out">Hair-follicle elongation / dermal-papilla-cell</text><text x="90" y="162" class="out">proliferation (in vitro / ex vivo)</text><rect x="40" y="174" width="34" height="34" rx="7" fill="#c56a2a"/><text x="57" y="197" text-anchor="middle" class="chip">D</text><text x="90" y="188" class="out">Topical serum increasing hair density in people (the</text><text x="90" y="208" class="out">marketed use)</text><rect x="40" y="220" width="34" height="34" rx="7" fill="#b23b3b"/><text x="57" y="243" text-anchor="middle" class="chip">F</text><text x="90" y="243" class="out">&quot;Regrows hair / treats hair loss&quot;</text><rect x="40" y="266" width="34" height="34" rx="7" fill="#8a9098"/><text x="57" y="289" text-anchor="middle" class="chip">–</text><text x="90" y="289" class="out">Safety (topical)</text>
