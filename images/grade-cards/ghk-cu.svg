  <rect x="522" y="44" width="72" height="72" rx="14" fill="#4f9d3f"/><text x="558" y="92" text-anchor="middle" class="obig">B</text><text x="558" y="132" text-anchor="middle" class="olab">overall</text>
  <line x1="40" y1="120" x2="600" y2="120" stroke="currentColor" stroke-opacity=".18"/>
  <rect x="40" y="128" width="34" height="34" rx="7" fill="#4f9d3f"/><text x="57" y="151" text-anchor="middle" class="chip">B</text><text x="90" y="142" class="out">Topical: appearance of photoaged skin (fine lines,</text><text x="90" y="162" class="out">firmness, density)</text><rect x="40" y="174" width="34" height="34" rx="7" fill="#4f9d3f"/><text x="57" y="197" text-anchor="middle" class="chip">B</text><text x="90" y="188" class="out">Collagen/elastin synthesis &amp; balanced MMP/TIMP</text><text x="90" y="208" class="out">remodeling</text><rect x="40" y="220" width="34" height="34" rx="7" fill="#8a9098"/><text x="57" y="243" text-anchor="middle" class="chip">–</text><text x="90" y="243" class="out">Skin penetration of intact-skin serums</text><rect x="40" y="266" width="34" height="34" rx="7" fill="#c08a1e"/><text x="57" y="289" text-anchor="middle" class="chip">C</text><text x="90" y="280" class="out">Post-procedure wound healing (e.g., after laser</text><text x="90" y="300" class="out">resurfacing)</text><rect x="40" y="312" width="34" height="34" rx="7" fill="#c56a2a"/><text x="57" y="335" text-anchor="middle" class="chip">D</text><text x="90" y="335" class="out">Hair growth / density</text><rect x="40" y="358" width="34" height="34" rx="7" fill="#b23b3b"/><text x="57" y="381" text-anchor="middle" class="chip">F</text><text x="90" y="372" class="out">Systemic / injectable &quot;anti-aging / resets gene</text><text x="90" y="392" class="out">expression&quot;</text><rect x="40" y="404" width="34" height="34" rx="7" fill="#c56a2a"/><text x="57" y="427" text-anchor="middle" class="chip">D</text><text x="90" y="427" class="out">&quot;Rebuilds collagen&quot; dermal synthesis</text><rect x="40" y="450" width="34" height="34" rx="7" fill="#8a9098"/><text x="57" y="473" text-anchor="middle" class="chip">–</text><text x="90" y="473" class="out">Safety (topical)</text>
