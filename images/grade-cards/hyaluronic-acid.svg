<svg xmlns="http://www.w3.org/2000/svg" width="640" height="638" viewBox="0 0 640 638" role="img">
  <style>
    .t { font: 600 27px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
