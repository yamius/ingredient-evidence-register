  <text x="40" y="66" class="t">Hyaluronic Acid (Sodium Hyaluronate)</text>
  <text x="40" y="90" class="s">hyaluronic-acid · evidence by outcome</text>
  <rect x="522" y="44" width="72" height="72" rx="14" fill="#1a7f52"/><text x="558" y="92" text-anchor="middle" class="obig">A</text><text x="558" y="132" text-anchor="middle" class="olab">overall</text>
  <line x1="40" y1="120" x2="600" y2="120" stroke="currentColor" stroke-opacity=".18"/>
  <rect x="40" y="128" width="34" height="34" rx="7" fill="#1a7f52"/><text x="57" y="151" text-anchor="middle" class="chip">A</text><text x="90" y="151" class="out">Topical: skin hydration (all molecular weights)</text><rect x="40" y="174" width="34" height="34" rx="7" fill="#4f9d3f"/><text x="57" y="197" text-anchor="middle" class="chip">B</text><text x="90" y="188" class="out">Fine lines and wrinkle appearance (LMW-HA 50–130</text><text x="90" y="208" class="out">kDa)</text><rect x="40" y="220" width="34" height="34" rx="7" fill="#4f9d3f"/><text x="57" y="243" text-anchor="middle" class="chip">B</text><text x="90" y="243" class="out">Skin elasticity and appearance of firmness</text><rect x="40" y="266" width="34" height="34" rx="7" fill="#4f9d3f"/><text x="57" y="289" text-anchor="middle" class="chip">B</text><text x="90" y="289" class="out">Barrier function / TEWL reduction</text><rect x="40" y="312" width="34" height="34" rx="7" fill="#4f9d3f"/><text x="57" y="335" text-anchor="middle" class="chip">B</text><text x="90" y="335" class="out">Oral supplementation for skin hydration and wrinkles</text><rect x="40" y="358" width="34" height="34" rx="7" fill="#1a7f52"/><text x="57" y="381" text-anchor="middle" class="chip">A</text><text x="90" y="372" class="out">Injectable dermal fillers (crosslinked HA, e.g.</text><text x="90" y="392" class="out">Restylane, Juvederm, Profhilo)</text><rect x="40" y="404" width="34" height="34" rx="7" fill="#c56a2a"/><text x="57" y="427" text-anchor="middle" class="chip">D</text><text x="90" y="418" class="out">&quot;Holds 1,000 times its weight in water&quot;</text><text x="90" y="438" class="out">skin-hydration advantage</text><rect x="40" y="450" width="34" height="34" rx="7" fill="#c56a2a"/><text x="57" y="473" text-anchor="middle" class="chip">D</text><text x="90" y="464" class="out">&quot;Fills wrinkles from within&quot; needle-free filler</text><text x="90" y="484" class="out">equivalence</text><rect x="40" y="496" width="34" height="34" rx="7" fill="#8a9098"/><text x="57" y="519" text-anchor="middle" class="chip">–</text><text x="90" y="519" class="out">Safety (topical)</text>
