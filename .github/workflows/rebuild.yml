name: rebuild

# Keeps the derived layers fresh and opens a PR with the diff — never auto-merges (a human
# reviews every change). Manual trigger plus a weekly cadence, because the scholarly
# cross-links (citation counts, open-access links) drift over time and freshness matters.
#
# Scope note: the register's MDX source is private and is NOT vendored into this public repo,
# so this Action regenerates only the layers that depend on the committed data — scholarly
# enrichment, images, checksums — and validates the result. A full regeneration from the MDX
# (enrich_identifiers.py + generate_dataset.py) is a local step that needs the private source;
# it is documented in PUBLISHING.md and METHODOLOGY.md.
on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"   # 06:17 UTC every Monday (off-peak minute)

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install --quiet -r build/requirements.txt

      - name: Refresh scholarly cross-links (OpenAlex + Semantic Scholar)
        run: python build/enrich_citations.py

      - name: Regenerate images from the committed identifiers + grades
        run: python build/generate_images.py

      - name: Refresh checksums over data/ + images/
        run: python build/generate_dataset.py --checksums-only

      - name: Validate integrity before proposing the change
        run: |
          python build/validate_dataset.py
          python build/validate_dataset.py --selftest

      - name: Build report
        id: report
        run: |
          {
            echo "### Automated rebuild report"
            echo ""
            echo "Regenerated the derived layers (scholarly enrichment, images, checksums) from the"
            echo "committed data. Full MDX regeneration is a separate local step (private source)."
            echo ""
            echo '```'
            git status --short
            echo '```'
          } > report.md
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Open a PR with the diff (never auto-merge)
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: automated rebuild of derived layers"
          branch: auto/rebuild
          delete-branch: true
          title: "Automated rebuild — derived layers refreshed"
          body-path: report.md
          labels: automated, needs-review
